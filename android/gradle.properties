org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation to fix Windows cross-drive cache corruption
# (C:\flutter pub cache vs E:\GitHub project causes IllegalArgumentException: different roots)
kotlin.incremental=false
