name: scroll_sense
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  
  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  
  # Charts & Visualizations
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^24.1.41
  
  # UI Components
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Permissions & Platform
  permission_handler: ^11.2.0
  device_info_plus: ^10.1.0
  
  # Background Service
  flutter_background_service: ^5.0.5
  
  # Usage Stats (Android)
  usage_stats: ^1.3.1
  
  # Charts
  syncfusion_flutter_gauges: ^24.1.41
  
  # Other
  intl: ^0.19.0
  uuid: ^4.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  table_calendar: ^3.1.0
  csv: ^6.0.0
  path_provider: ^2.1.2

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.ttf
          weight: 900
